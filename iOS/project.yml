name: XtreamPlayer
options:
  bundleIdPrefix: com.xtream
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    PRODUCT_BUNDLE_IDENTIFIER: com.xtream.player
    DEVELOPMENT_TEAM: ""
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_PREVIEWS: YES

targets:
  XtreamPlayer:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: XtreamPlayer
        excludes:
          - "Resources/Info.plist"
    info:
      path: XtreamPlayer/Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xtream.player
        PRODUCT_NAME: XtreamPlayer
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "15.0"
    capabilities: {}

schemes:
  XtreamPlayer:
    build:
      targets:
        XtreamPlayer: all
    run:
      config: Debug
    archive:
      config: Release
